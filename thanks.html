<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks - George Han</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="contact.html" data-path="~/contact">

  <div class="window">

    <header>
      <a class="site-logo" href="index.html"><span class="lb">&lt;</span>George Han<span class="lb">/&gt;</span></a>
      <nav id="nav"></nav>
    </header>

    <main>

      <div class="prompt">
        <span class="p-user">george</span><span class="p-at">@</span><span class="p-host">han</span><span class="p-sep">:</span><span class="p-path">~/contact</span><span class="p-sym">$</span>
        <span class="p-cmd">tail -1 messages.log</span>
      </div>

      <div class="output">
        <div class="sh">Message Sent</div>
        <p>
          Thanks for reaching out. Your message has been sent successfully.
        </p>
        <br />
        <p class="sub0">
          George will get back to you by email if a reply is needed.
        </p>
        <br />
        <a href="contact.html" class="social-link">send another message</a>
      </div>

      <div class="prompt">
        <span class="p-user">george</span><span class="p-at">@</span><span class="p-host">han</span><span class="p-sep">:</span><span class="p-path">~/contact</span><span class="p-sym">$</span>
        <span class="cursor"></span>
      </div>

    </main>

    <footer>
      <span>George Han - Cambridge</span>
      <span id="clock"></span>
    </footer>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
